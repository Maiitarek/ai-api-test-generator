openapi: "3.0.0"
info:
  title: Pet Store API
  version: "1.0.0"

servers:
  - url: https://petstore3.swagger.io/api/v3

paths:
  /pet/{petId}:
    get:
      tags: [pet]
      operationId: getPetById
      summary: Find pet by ID
      parameters:
        - name: petId
          in: path
          required: true
          schema: {type: integer, example: 1}
      responses:
        "200": {description: Successful}
        "404": {description: Not found}
  /pet:
    post:
      tags: [pet]
      operationId: addPet
      summary: Add a new pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, photoUrls]
              properties:
                name: {type: string, example: doggie}
                photoUrls:
                  type: array
                  items: {type: string}
                status:
                  type: string
                  enum: [available, pending, sold]
      responses:
        "200": {description: Successful}
        "405": {description: Invalid input}
