name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip}
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short --no-header
      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: unit-test-results, path: allure-results/, retention-days: 7}

  integration-tests:
    name: Integration tests (mock server)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip}
      - run: pip install -r requirements.txt
      - name: Start mock server
        run: python mock_server.py &
      - name: Wait for server
        run: sleep 3
      - name: Generate and run tests
        run: python main.py --spec sample_specs/local_mock.yaml
      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: allure-results, path: allure-results/, retention-days: 7}
      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: summary-report, path: reports/, retention-days: 7}
